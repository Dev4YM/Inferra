services:
  inferra:
    build:
      context: .
      dockerfile: Dockerfile
    image: inferra:local
    ports:
      - "7433:7433"
    volumes:
      - inferra-data:/data
      - ./deploy/examples/inferra.container.toml:/etc/inferra/inferra.toml:ro
    restart: unless-stopped

volumes:
  inferra-data:
