# Inferra local configuration — override defaults from src/config/defaults.toml.
# Only values that differ from defaults need to be listed here.
# The full schema with documentation lives in src/config/defaults.toml.

[server]
host = "127.0.0.1"
cors_origins = ["http://127.0.0.1:7433", "http://localhost:7433"]

[storage]
data_dir = "./data"

[collectors]
auto_start = false

[collectors.file]
enabled = true

[[collectors.file.entries]]
path = "./logs/app.log"
service_id = "app"

[ai]
enabled = false
provider = "ollama"
model = "gemma4:e4b"

[experience]
mode = "operator"
