[server]
host = "127.0.0.1"
port = 7433
cors_origins = ["http://127.0.0.1:7433", "http://localhost:7433"]
auth_token_env = ""
require_loopback = true
expose_prometheus_metrics = false
rate_limit_chat_tokens_per_minute = 30.0
rate_limit_explain_tokens_per_minute = 15.0

[storage]
data_dir = "./data"
events_db = "events.db"
incidents_db = "incidents.db"
retention_hours = 72
batch_size = 100
flush_interval_ms = 500
wal_mode = true
prune_interval_seconds = 60
enable_mmap = true
mmap_size_mb = 256

[observability.indexed_attributes]
# Flat OTel-style keys under JSON `attributes` copied into SQLite `event_attributes` on ingest.
keys = ["http.status_code", "http.route", "exception.type"]

[observability.fts]
enabled = false

# OTLP/HTTP logs (`POST /v1/logs`) via JSON or protobuf. Uses the same Bearer token as [collectors.app].shared_token when set.
[observability.otlp]
enabled = false
max_logs_per_request = 500
max_payload_bytes = 4194304

# Forward new events as OTLP/HTTP JSON (`ExportLogsServiceRequest`) to an external collector.
# Do not point `url` at this same Inferra instance's `/v1/logs` (ingest loop).
[observability.export]
enabled = false
url = ""
interval_seconds = 30
batch_size = 100
timeout_seconds = 15
max_retries = 3
retry_initial_seconds = 1.0
retry_max_seconds = 30.0
backfill_on_start = false
bearer_token = ""

[collectors]
auto_start = false
retry_initial_seconds = 1.0
retry_max_seconds = 60.0

[collectors.docker]
enabled = true
socket = "/var/run/docker.sock"
include_names = []
include_labels = []
exclude_names = ["inferra-*"]
include_all = true

[collectors.journald]
enabled = true
units = []
exclude_units = ["systemd-resolved.service", "systemd-timesyncd.service"]
min_priority = 6
poll_interval_seconds = 5.0
since = "-1 hour"
limit = 200

[collectors.file]
enabled = true
paths = []
poll_interval_seconds = 1.0
start_at_end = false

[[collectors.file.entries]]
path = "./logs/app.log"
glob = ""
service_id = "app"
service_id_from_filename = false
multiline_pattern = ""

[collectors.process]
enabled = true
poll_interval_seconds = 10.0
watch_processes = ["nginx", "postgres", "python", "node", "java"]
watch_pids = []
disk_paths = ["/", "/var/log", "/data"]
top_n = 20
min_cpu_percent = 75.0
min_memory_mb = 512.0

[collectors.app]
enabled = true
listen = "127.0.0.1:9876"
max_payload_bytes = 65536
shared_token = ""
mount_path = "/api/ingest"
enable_main_api = true
enable_standalone = false

[collectors.windows_eventlog]
enabled = true
channels = ["Application", "System"]
poll_interval_seconds = 5.0

[collectors.host_metrics]
enabled = true
poll_interval_seconds = 10.0
warn_cpu_percent = 85.0
warn_memory_percent = 85.0
warn_disk_percent = 90.0

[collectors.windows_service]
enabled = true
poll_interval_seconds = 30.0
include_stopped = false
names = []

[collectors.linux_syslog]
enabled = true
paths = ["/var/log/syslog", "/var/log/messages"]
poll_interval_seconds = 2.0
start_at_end = true

[collectors.kubernetes]
enabled = false
poll_interval_seconds = 15.0
namespaces = []
all_namespaces = true
label_selector = ""
limit = 200
include_pods = true
include_events = true

[normalization]
host_id = ""
max_message_length = 1024
max_structured_data_bytes = 32768
timestamp_future_tolerance_seconds = 60
fingerprint_hash = "sha256"
fingerprint_length = 32

[[normalization.log_formats]]
name = "json"
pattern = ""
timestamp_field = "timestamp"
severity_field = "level"
message_field = "message"

[[normalization.tag_rules]]
pattern = "connection refused"
tags = ["connection_refused"]

[[normalization.service_mappings]]
pattern = "./logs/app.log"
service_id = "app"

[deduplication]
enabled = true
window_seconds = 60
max_tracked_fingerprints = 10000
periodic_summary_interval_seconds = 60
severity_escalation_splits = true

[noise_filter]
enabled = true
blocklist_enabled = true
allowlist_enabled = true
adaptive_enabled = true
frequency_window_minutes = 5
high_rate_threshold_per_minute = 100
stability_threshold_cv = 0.2
routine_sample_target_per_minute = 5
relevance_scoring_enabled = true
noise_threshold = 0.7
high_volume_events_per_second = 200
registry_enabled = true
registry_expiry_days = 14
always_keep_severity = "ERROR"

[[noise_filter.blocklist]]
pattern = "health check passed"
service_id = ""
severity_max = "INFO"
reason = "routine health signal"

[[noise_filter.allowlist]]
pattern = "out of memory"
severity_min = "ERROR"
tags = ["oom"]
reason = "resource failures are always relevant"

[anomaly_detection]
enabled = true
bucket_interval_minutes = 5
baseline_update_interval_hours = 1
baseline_alpha = 0.1
cold_start_hours = 6
min_samples_for_confidence = 4
spike_z_threshold = 3.0
sustained_lookback_buckets = 6
absence_sensitivity = 0.1

[anomaly_detection.weights]
error_rate = 0.35
event_volume = 0.2
new_fingerprint_rate = 0.2
restart_count = 0.15
warn_rate = 0.1

[anomaly_detection.event_score_weights]
severity = 0.12
fingerprint_anomaly = 0.13
resource_tag = 0.75

[anomaly_detection.expected_heartbeats]

[correlation]
analysis_interval_seconds = 5
analysis_window_seconds = 60
temporal_lookback_seconds = 30
temporal_lookahead_seconds = 10
temporal_half_life_seconds = 10.0
max_hop_distance = 3
dependency_weight_decay = "inverse"
cooccurrence_bucket_seconds = 5
cascade_window_seconds = 30
cluster_min_edge_weight = 0.15
cluster_min_events = 2
merge_on_shared_service_and_time = true

[inference_graph]
budget_ms = 100
max_events_for_graph = 500
plausibility_threshold = 0.15
max_edges_per_node = 10

[inference_graph.strategies]
dependency_propagation = true
same_service_escalation = true
resource_preceded_error = true
config_preceded_error = true
restart_preceded_disconnection = true
shared_fate = true
timeout_chain = true

[hypothesis_engine]
max_hypotheses_per_incident = 50
min_supporting_events = 1
min_generation_confidence = 0.1
dedup_overlap_threshold = 0.5

[[hypothesis_engine.custom_rules]]
name = "redis_timeout_cascade"
requires = ["connection_failures_outbound", "error_spike"]
requires_same_service = false
requires_temporal_order = false
cause_type = "dependency_failure"
cause_subtype = "redis_timeout"
title_template = "Redis timeout causing service errors"
confidence = 0.65

[hypothesis_validation]
enabled = true
temporal_consistency_threshold = 0.5
temporal_consistency_warn = 0.2
contradiction_ratio_fail = 0.6
contradiction_ratio_warn = 0.3
min_root_cause_severity = "WARN"
confidence_reduction_per_warning = 0.2

[scoring]
temporal_alignment = 0.25
correlation_strength = 0.2
frequency_weight = 0.15
dependency_proximity = 0.15
evidence_coverage = 0.15
anomaly_severity = 0.1

[scoring.tuning]
enabled = true
learning_rate = 0.05
max_drift_from_default = 0.5
min_weight = 0.03
tiebreak_order = ["evidence_coverage", "contradicting_events_asc", "root_cause_timestamp_asc"]

[calibration]
enabled = true
min_samples_per_bucket = 10
bucket_count = 5
staleness_threshold_days = 30
persistence_file = "./data/calibration.json"

[calibration.defaults]
high_threshold = 0.75
medium_threshold = 0.4

[contradiction_handling]
enabled = true
timeline_tolerance_seconds = 5.0
strong_penalty_per_contradiction = 0.15
weak_penalty_per_contradiction = 0.05
min_penalty_multiplier = 0.5

[contradiction_handling.rules]
timeline_violation = true
health_check = true
resource_state = true
scope_mismatch = true
mutual_exclusion = true

[explanation]
provider = "template"
fallback = "template_fallback"
timeout_seconds = 30.0
max_retries = 2
temperature = 0.2
max_tokens = 2048
cache_enabled = true

[explanation.sanitization]
strip_ips = true
strip_env_values = true
strip_paths = true
keep_service_names = true
keep_timestamps = true

[explanation.guardrails]
verify_service_names = true
verify_timestamps = true
verify_causal_claims = true
check_overconfidence = true

[incident_lifecycle]
stale_timeout_seconds = 900
merge_time_threshold_seconds = 300
archive_after_days = 7
enable_auto_split = true
staleness_check_interval_seconds = 60

[incident_lifecycle.limits]
max_events_per_incident = 10000
max_active_incidents = 200
max_clusters_per_incident = 20

# Topology edges define service dependency relationships used by the
# inference graph and correlation engine. Add edges that match your
# real deployment. Example:
#   [[topology.edges]]
#   source = "api-gateway"
#   target = "user-service"
#   type = "calls"
#
#   [[topology.edges]]
#   source = "user-service"
#   target = "postgres"
#   type = "depends_on"

[logging]
level = "INFO"

[logging.module_levels]

[ai]
enabled = false
provider = "ollama"
base_url = "http://127.0.0.1:11434"
model = "gemma4:e4b"
token_env = ""
allow_remote = false
temperature = 1.0
top_p = 0.95
top_k = 64
timeout_seconds = 30.0
connect_timeout_seconds = 5.0
read_timeout_seconds = 120.0
max_retries = 2
max_tokens = 2048
stream = true
cache_enabled = true
cache_ttl_seconds = 3600
max_context_events = 30
redact_raw_logs = true
nl_search_min_confidence = 0.55
investigation_monitor_seconds = 5
investigation_monitor_interval_ms = 500
model_status = ""
model_investigate = ""

[experience]
mode = "operator"
ai_role = "investigator"
suggest_safe_actions = true
execute_actions = false
show_raw_evidence_by_default = false

[workspace]
enabled = true
roots = []
max_depth = 4
max_results = 100
map_runtime = true
redact_env_files = true
service_mappings = []
