{{- if .Values.auth.createSecret }}
{{- if not .Values.auth.token }}
{{- fail "auth.token must be set when auth.createSecret=true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "inferra.authSecretName" . }}
  labels:
    app.kubernetes.io/name: {{ include "inferra.name" . }}
type: Opaque
stringData:
  {{ .Values.auth.secretKey }}: {{ .Values.auth.token | quote }}
{{- end }}
