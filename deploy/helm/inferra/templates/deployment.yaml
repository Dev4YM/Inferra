apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inferra.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "inferra.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "inferra.name" . }}
    spec:
      serviceAccountName: {{ include "inferra.serviceAccountName" . }}
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      initContainers:
        - name: inferra-init-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-lc"]
          args:
            - inferra --config /etc/inferra/inferra.toml init-db
          volumeMounts:
            - name: config
              mountPath: /etc/inferra
            - name: data
              mountPath: /data
      containers:
        - name: inferra
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}
          args:
            - "--config"
            - "/etc/inferra/inferra.toml"
            - "serve"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          volumeMounts:
            - name: config
              mountPath: /etc/inferra
            - name: data
              mountPath: /data
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "inferra.fullname" . }}-config
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "inferra.fullname" . }}-data
