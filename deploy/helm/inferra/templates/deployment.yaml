apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inferra.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "inferra.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "inferra.name" . }}
    spec:
      containers:
        - name: inferra
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 7433
          volumeMounts:
            - name: config
              mountPath: /etc/inferra
            - name: data
              mountPath: /data
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "inferra.fullname" . }}-config
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "inferra.fullname" . }}-data
