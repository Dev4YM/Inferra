{{- if and .Values.rbac.create .Values.config.collectors.kubernetes.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "inferra.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "inferra.name" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "inferra.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "inferra.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
