{{- if and (not .Values.server.requireLoopback) (not .Values.server.authTokenEnv) }}
{{- fail "server.authTokenEnv is required when server.requireLoopback=false" }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "inferra.fullname" . }}-config
data:
  inferra.toml: |
    [server]
    host = "{{ .Values.server.host }}"
    port = {{ .Values.service.port }}
    require_loopback = {{ .Values.server.requireLoopback }}
    auth_token_env = "{{ .Values.server.authTokenEnv }}"
    expose_prometheus_metrics = {{ .Values.server.exposePrometheusMetrics }}
    cors_origins = [{{- range $i, $origin := .Values.server.corsOrigins }}{{ if $i }}, {{ end }}"{{ $origin }}"{{- end }}]

    [storage]
    data_dir = "/data"
    retention_hours = 72

    [collectors]
    auto_start = {{ .Values.config.collectors.auto_start }}

    [collectors.kubernetes]
    enabled = {{ .Values.config.collectors.kubernetes.enabled }}
    poll_interval_seconds = {{ .Values.config.collectors.kubernetes.poll_interval_seconds }}
    all_namespaces = {{ .Values.config.collectors.kubernetes.all_namespaces }}
    label_selector = "{{ .Values.config.collectors.kubernetes.label_selector }}"
    limit = {{ .Values.config.collectors.kubernetes.limit }}
    include_pods = {{ .Values.config.collectors.kubernetes.include_pods }}
    include_events = {{ .Values.config.collectors.kubernetes.include_events }}
    namespaces = [{{- range $i, $n := .Values.config.collectors.kubernetes.namespaces }}{{ if $i }}, {{ end }}"{{ $n }}"{{- end }}]

    [ai]
    enabled = {{ .Values.config.ai.enabled }}
    provider = "ollama"
    base_url = "{{ .Values.config.ai.baseUrl }}"
    model = "{{ .Values.config.ai.model }}"
    token_env = "{{ .Values.config.ai.tokenEnv }}"
    timeout_seconds = 30.0
    temperature = 1.0
    top_p = 0.95
    top_k = 64
    max_context_events = 30
    redact_raw_logs = true
    allow_remote = {{ .Values.config.ai.allowRemote }}
