[server]
host = "0.0.0.0"
port = 7433
cors_origins = []
auth_token_env = "INFERRA_API_TOKEN"
require_loopback = false
expose_prometheus_metrics = false

[storage]
data_dir = "/data"
retention_hours = 72

[ai]
enabled = false
provider = "ollama"
base_url = "http://host.docker.internal:11434"
model = "gemma4:e4b"
token_env = ""
timeout_seconds = 30.0
temperature = 1.0
top_p = 0.95
top_k = 64
max_context_events = 30
redact_raw_logs = true
allow_remote = false
