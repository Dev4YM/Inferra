version: 2
updates:
  - package-ecosystem: cargo
    directory: /src
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /src/web/frontend
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
