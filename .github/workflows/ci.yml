name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-support:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall tests deploy deprecated
      - name: Ruff
        run: python -m ruff check tests deploy deprecated
      - name: Test (POSIX-like)
        if: runner.os != 'Windows'
        run: python -m pytest -q -m "not windows and not chaos"
      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: python -m pytest -q -m "not linux and not chaos"

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust format
        run: cargo fmt --manifest-path src/Cargo.toml --all --check
      - name: Rust clippy
        run: cargo clippy --manifest-path src/Cargo.toml --workspace --all-targets -- -D warnings
      - name: Rust test
        run: cargo test --manifest-path src/Cargo.toml --workspace

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/web/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: src/web/frontend
        run: npm ci
      - name: Build frontend
        working-directory: src/web/frontend
        run: npm run build

  docs:
    name: Docs strict build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs tooling
        run: python -m pip install -e ".[docs,dev]"
      - name: Build docs
        run: mkdocs build --strict

  runtime-smoke:
    name: Rust binary smoke
    runs-on: ubuntu-latest
    needs: [rust, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build release CLI
        run: cargo build --manifest-path src/Cargo.toml -p inferra-cli --release
      - name: Smoke built runtime
        run: >
          python tests/scripts/rust_runtime_smoke.py
          --binary "${{ github.workspace }}/target/release/inferra"
          --repo-root "${{ github.workspace }}"
          --ui-dist "${{ github.workspace }}/src/web/ui_dist"

  chaos:
    name: Chaos resilience
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Chaos
        run: python -m pytest -q -m chaos --tb=short

  perf:
    name: Performance budgets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Perf
        env:
          PERF_REPORT_PATH: ${{ github.workspace }}/perf_report.json
        run: python -m pytest -q -m perf --tb=short
      - uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: perf_report.json

  helm-template:
    name: Helm template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Render chart
        run: helm template inferra ./deploy/helm/inferra --debug >/dev/null
