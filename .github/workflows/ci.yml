name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall src tests
      - name: Ruff
        run: python -m ruff check src tests
      - name: Test (POSIX-like)
        if: runner.os != 'Windows'
        run: python -m pytest -q -m "not windows and not chaos" --cov=src --cov-report=term
      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: python -m pytest -q -m "not linux and not chaos" --cov=src --cov-report=term

  chaos:
    name: Chaos resilience
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Chaos
        run: python -m pytest -q -m chaos --tb=short

  perf:
    name: Performance budgets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Perf
        env:
          PERF_REPORT_PATH: ${{ github.workspace }}/perf_report.json
        run: python -m pytest -q -m perf --tb=short
      - uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: perf_report.json

  helm-template:
    name: Helm template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Render chart
        run: helm template inferra ./deploy/helm/inferra --debug >/dev/null
