name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q

  wheel-sdist:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and sdist
        run: python -m pip install build && python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  sbom:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project and SBOM tool
        run: python -m pip install -e . cyclonedx-bom
      - name: Generate SBOM
        run: cyclonedx-py environment --pyproject pyproject.toml --of JSON -o cyclonedx-sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: cyclonedx-sbom.json

  helm-chart:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Package chart
        run: helm package deploy/helm/inferra --destination dist-chart
      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist-chart/*.tgz

  windows-exe:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[windows,build-windows]"
      - name: Build onefile exe (staged dist + promote + smoke test)
        shell: pwsh
        run: ./deploy/windows/build-exe.ps1 -SkipReleaseLocks -Python python -CleanPyInstallerWork
      - name: Sign with signtool when certificate secret is set
        shell: pwsh
        env:
          WINDOWS_CERT_THUMBPRINT: ${{ secrets.WINDOWS_CERT_THUMBPRINT }}
        run: |
          $exe = "dist/inferra.exe"
          if (-not $env:WINDOWS_CERT_THUMBPRINT) {
            Write-Host "WINDOWS_CERT_THUMBPRINT not set; skipping Authenticode (see docs/operations/release_signing.md)."
            exit 0
          }
          signtool sign /sha1 $env:WINDOWS_CERT_THUMBPRINT /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $exe
      - uses: actions/upload-artifact@v4
        with:
          name: inferra-windows-exe
          path: |
            dist/inferra.exe
            dist/inferra-*.exe

  docker-image:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase GHCR image name
        id: image_lc
        shell: bash
        run: echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_lc.outputs.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref_type == 'tag' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Install cosign
        if: github.ref_type == 'tag'
        uses: sigstore/cosign-installer@v3.7.0
      - name: Sign image digest (keyless)
        if: github.ref_type == 'tag'
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ steps.image_lc.outputs.repository }}@${{ steps.push.outputs.digest }}"
