name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  verify-python-support:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall tests deploy
      - name: Ruff
        run: python -m ruff check tests deploy
      - name: Test
        run: python -m pytest -q tests/unit/test_rust_packaging_contracts.py

  docs:
    needs: verify-python-support
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs tooling
        run: python -m pip install -e ".[docs,dev]"
      - name: Build docs
        run: mkdocs build --strict

  verify-rust:
    needs: verify-python-support
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust checks
        run: |
          cargo fmt --manifest-path src/Cargo.toml --all --check
          cargo clippy --manifest-path src/Cargo.toml --workspace --all-targets -- -D warnings
          cargo test --manifest-path src/Cargo.toml --workspace
          cargo build --manifest-path src/Cargo.toml -p inferra-cli --release

  frontend:
    needs: verify-python-support
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/web/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: src/web/frontend
        run: npm ci
      - name: Build frontend
        working-directory: src/web/frontend
        run: npm run build

  runtime-smoke:
    needs: [verify-rust, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build release CLI
        run: cargo build --manifest-path src/Cargo.toml -p inferra-cli --release
      - name: Smoke built runtime
        run: >
          python tests/scripts/rust_runtime_smoke.py
          --binary "${{ github.workspace }}/target/release/inferra"
          --repo-root "${{ github.workspace }}"
          --ui-dist "${{ github.workspace }}/src/web/ui_dist"

  sbom:
    needs: verify-rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate Rust SBOM
        run: cargo cyclonedx --manifest-path src/Cargo.toml --format json --output-file rust-sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx-rust
          path: rust-sbom.json

  helm-chart:
    needs: [verify-python-support, docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Package chart
        run: helm package deploy/helm/inferra --destination dist-chart
      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist-chart/*.tgz

  windows-exe:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [verify-rust, frontend]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build native Rust exe
        shell: pwsh
        run: ./deploy/windows/build-rust-exe.ps1 -CopyUiBundle
      - name: Smoke built Windows runtime
        shell: pwsh
        run: >
          python tests/scripts/rust_runtime_smoke.py
          --binary "${{ github.workspace }}/dist/inferra.exe"
          --repo-root "${{ github.workspace }}"
          --ui-dist "${{ github.workspace }}/dist/runtime-assets/ui_dist"
      - name: Sign with signtool when certificate secret is set
        shell: pwsh
        env:
          WINDOWS_CERT_THUMBPRINT: ${{ secrets.WINDOWS_CERT_THUMBPRINT }}
        run: |
          if (-not $env:WINDOWS_CERT_THUMBPRINT) {
            Write-Host "WINDOWS_CERT_THUMBPRINT not set; skipping Authenticode (see docs/operations/release_signing.md)."
            exit 0
          }
          $targets = @("dist/inferra-rust.exe", "dist/inferra.exe") | Where-Object { Test-Path $_ }
          foreach ($exe in $targets) {
            signtool sign /sha1 $env:WINDOWS_CERT_THUMBPRINT /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $exe
          }
      - uses: actions/upload-artifact@v4
        with:
          name: inferra-windows-rust-exe
          path: |
            dist/inferra-rust.exe
            dist/inferra.exe
            dist/runtime-assets/**

  docker-image:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [verify-rust, frontend, runtime-smoke, docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase GHCR image name
        id: image_lc
        shell: bash
        run: echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_lc.outputs.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref_type == 'tag' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Install cosign
        if: github.ref_type == 'tag'
        uses: sigstore/cosign-installer@v3.7.0
      - name: Sign image digest (keyless)
        if: github.ref_type == 'tag'
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ steps.image_lc.outputs.repository }}@${{ steps.push.outputs.digest }}"
